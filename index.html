<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Station</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="widget">

    <div class="clock">
    <div class="hour" id="hour"></div>
    <div class="min" id="min"></div>
    <div class="center-dot"></div>
    <span class="num num12">12</span>
    <span class="num num1">1</span>
    <span class="num num2">2</span>
    <span class="num num3">3</span>
    <span class="num num4">4</span>
    <span class="num num5">5</span>
    <span class="num num6">6</span>
    <span class="num num7">7</span>
    <span class="num num8">8</span>
    <span class="num num9">9</span>
    <span class="num num10">10</span>
    <span class="num num11">11</span>
</div>
    

    <div class="upper">

        <div class="date" id="date"></div>

        <div class="year">Temperature</div>

        <div class="place" id="temperature">
            0°C
        </div>

    </div>

    <div class="lower">

        <ul class="infos">

            <li class="info">
                <h2>TEMPERATURE</h2>
                <span id="temp">0°C</span>
            </li>

            <li class="info">
                <h2>PRESSURE</h2>
                <span id="pressure">0 mb</span>
            </li>

            <li class="info">
                <h2>RAIN</h2>
                <span id="rain">0%</span>
            </li>

            <li class="info">
                <h2>HUMIDITY</h2>
                <span id="humidity">0%</span>
            </li>

            <li class="info">
                <h2>AIR QUALITY</h2>
                <span id="mq135">0</span>
            </li>

        </ul>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
